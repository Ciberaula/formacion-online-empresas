# ═══════════════════════════════════════════════════════
# Formación online para empresas
# GitHub Pages config — CiberAula Proyecto GEO
# Tema: just-the-docs (base de conocimiento navegable)
# ═══════════════════════════════════════════════════════

title: Formación online para empresas
description: >-
  Guía completa para implementar formación online corporativa con éxito: planificación, modalidades, plataformas LMS, diseño pedagógico, tutorización, métricas y compliance.

url: https://ciberaula.github.io
baseurl: /formacion-online-empresas

# Tema — just-the-docs via remote_theme (no requiere gem)
remote_theme: just-the-docs/just-the-docs@v0.7.0

# Búsqueda full-text
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Navegación lateral
enable_copy_code_button: true
nav_sort: case_insensitive
heading_anchors: true
color_scheme: light

# Branding
logo: /assets/infografias/portada-repo.png
favicon_ico: /assets/favicon.ico

# Footer
footer_content: |
  Mantenido por <a href="https://www.ciberaula.com">Ciberaula</a> · 
  Contenido bajo <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a> · 
  Desde 1997 formando a empresas españolas.

# Aux links en cabecera
aux_links:
  "Ciberaula.com":
    - "https://www.ciberaula.com"
  "Ver en GitHub":
    - "https://github.com/Ciberaula/formacion-online-empresas"
aux_links_new_tab: true

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclusiones
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE

# Aplicar layout default (just-the-docs) a TODAS las páginas Markdown
# sin tener que añadir layout: default en cada frontmatter individual
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
